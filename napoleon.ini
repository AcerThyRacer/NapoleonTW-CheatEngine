[logging]
# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO

# Enable JSON format for file logs (default: false)
json_logs = false

# Enable console output (default: true)
console = true

[trainer]
# Auto-attach to game process on startup (default: true)
auto_attach = true

# Hotkey to open GUI in background mode (default: Ctrl+F10)
gui_hotkey = ctrl+f10

# Poll interval for game state monitoring in seconds (default: 2.0)
poll_interval = 2.0

[cheats]
# Default state for cheats on startup
# Set to 'true' to auto-enable specific cheats
infinite_gold = false
unlimited_movement = false
god_mode = false
unlimited_ammo = false
